<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>התרעות אבן יהודה</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f1117;
      color: #e8eaf6;
      min-height: 100vh;
      direction: rtl;
    }

    header {
      background: #1a1d2e;
      border-bottom: 2px solid #2d3148;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #ffffff;
    }

    header .subtitle {
      font-size: 0.85rem;
      color: #8892b0;
      margin-top: 2px;
    }

    .shield-icon {
      font-size: 2rem;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ── Live Alert Card ── */
    .live-card {
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
      border: 2px solid transparent;
      transition: all 0.4s ease;
    }

    .live-card.safe {
      background: #12261e;
      border-color: #1e6b45;
    }

    .live-card.alert {
      background: #2a0a0a;
      border-color: #c0392b;
      animation: pulse-border 1.2s ease-in-out infinite;
    }

    @keyframes pulse-border {
      0%, 100% { border-color: #c0392b; }
      50%       { border-color: #e74c3c; box-shadow: 0 0 24px rgba(231, 76, 60, 0.4); }
    }

    .live-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .live-card-title {
      font-size: 1rem;
      font-weight: 600;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-left: 6px;
    }

    .status-dot.live {
      background: #2ecc71;
      box-shadow: 0 0 8px #2ecc71;
      animation: blink 1.4s ease-in-out infinite;
    }

    .status-dot.checking {
      background: #f39c12;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .alert-state {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .alert-state.safe-text  { color: #2ecc71; }
    .alert-state.alert-text { color: #e74c3c; }

    .alert-desc {
      font-size: 0.95rem;
      color: #aab4c4;
    }

    .alert-categories {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .category-badge {
      background: rgba(231, 76, 60, 0.2);
      border: 1px solid #c0392b;
      color: #e74c3c;
      border-radius: 6px;
      padding: 4px 12px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .last-updated {
      font-size: 0.8rem;
      color: #525f7f;
      margin-top: 10px;
    }

    /* ── History Section ── */
    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #c5cae9;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2d3148;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .history-item {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .history-item:hover {
      border-color: #3d4270;
    }

    .history-item .city {
      font-weight: 700;
      font-size: 1rem;
      color: #e8eaf6;
    }

    .history-item .category {
      font-size: 0.85rem;
      color: #9fa8da;
      margin-top: 3px;
    }

    .history-item .time {
      font-size: 0.82rem;
      color: #525f7f;
      white-space: nowrap;
      flex-shrink: 0;
      text-align: left;
    }

    .no-history {
      text-align: center;
      padding: 40px;
      color: #525f7f;
      font-size: 0.95rem;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #525f7f;
    }

    .spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid #2d3148;
      border-top-color: #7986cb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .refresh-bar {
      height: 3px;
      background: #2d3148;
      border-radius: 2px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .refresh-progress {
      height: 100%;
      background: linear-gradient(90deg, #7986cb, #5c6bc0);
      border-radius: 2px;
      transition: width 1s linear;
    }

    .error-notice {
      background: #1e1a0a;
      border: 1px solid #7d6608;
      color: #f0c040;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<header>
  <span class="shield-icon">🛡️</span>
  <div>
    <h1>התרעות פיקוד העורף — אבן יהודה</h1>
    <div class="subtitle">עדכון בזמן אמת מאתר פיקוד העורף הרשמי</div>
  </div>
</header>

<main>
  <!-- Progress bar for next refresh -->
  <div class="refresh-bar">
    <div class="refresh-progress" id="refreshProgress" style="width:100%"></div>
  </div>

  <!-- Live alert card -->
  <div class="live-card safe" id="liveCard">
    <div class="live-card-header">
      <span class="live-card-title">
        <span class="status-dot checking" id="statusDot"></span>
        התרעה פעילה כעת
      </span>
      <span id="liveUpdateTime" class="last-updated"></span>
    </div>
    <div id="liveContent" class="loading">
      <div class="spinner"></div><br>טוען...
    </div>
  </div>

  <!-- History -->
  <div class="section-title">היסטוריית התרעות — 24 שעות אחרונות (אבן יהודה)</div>
  <div id="historyContent" class="loading">
    <div class="spinner"></div><br>טוען היסטוריה...
  </div>
</main>

<script>
  const CITY = 'אבן יהודה';
  const ALERT_INTERVAL_MS = 5000;   // poll current alerts every 5s
  const HISTORY_INTERVAL_MS = 60000; // poll history every 60s

  const liveCard    = document.getElementById('liveCard');
  const liveContent = document.getElementById('liveContent');
  const statusDot   = document.getElementById('statusDot');
  const liveUpdateTime = document.getElementById('liveUpdateTime');
  const historyContent = document.getElementById('historyContent');
  const refreshProgress = document.getElementById('refreshProgress');

  let progressValue = 100;
  let progressTimer = null;

  function startProgressBar(durationMs) {
    clearInterval(progressTimer);
    progressValue = 100;
    refreshProgress.style.transition = 'none';
    refreshProgress.style.width = '100%';
    setTimeout(() => {
      refreshProgress.style.transition = `width ${durationMs}ms linear`;
      refreshProgress.style.width = '0%';
    }, 50);
  }

  function formatTime(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr);
      return d.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
           + ' ' + d.toLocaleDateString('he-IL', { day: '2-digit', month: '2-digit' });
    } catch {
      return dateStr;
    }
  }

  async function fetchCurrentAlerts() {
    try {
      const res = await fetch('/api/alerts');
      const data = await res.json();

      statusDot.className = 'status-dot live';
      liveUpdateTime.textContent = 'עודכן: ' + new Date().toLocaleTimeString('he-IL');

      if (!data || !data.data || data.data.length === 0) {
        // No active alert
        liveCard.className = 'live-card safe';
        liveContent.innerHTML = `
          <div class="alert-state safe-text">אין התרעה פעילה</div>
          <div class="alert-desc">אין כרגע התרעה פעילה עבור אבן יהודה.</div>
        `;
        return;
      }

      // Check if our city is in the alert
      const cityInAlert = data.data.some(c => c.includes(CITY) || CITY.includes(c));
      const allCities = data.data;

      liveCard.className = cityInAlert ? 'live-card alert' : 'live-card safe';

      if (cityInAlert) {
        liveContent.innerHTML = `
          <div class="alert-state alert-text">🚨 התרעה פעילה!</div>
          <div class="alert-desc">${data.title || 'התרעה'}</div>
          <div class="alert-categories">
            ${allCities.filter(c => c.includes(CITY) || CITY.includes(c))
              .map(c => `<span class="category-badge">${c}</span>`).join('')}
          </div>
        `;
      } else {
        liveContent.innerHTML = `
          <div class="alert-state safe-text">אין התרעה עבור אבן יהודה</div>
          <div class="alert-desc">ישנה התרעה פעילה באזורים אחרים (${allCities.length} ישובים).</div>
        `;
      }
    } catch (err) {
      statusDot.className = 'status-dot checking';
      liveContent.innerHTML = `<div class="error-notice">⚠️ שגיאה בטעינת נתונים: ${err.message}</div>`;
    }
  }

  async function fetchHistory() {
    try {
      const res = await fetch('/api/history');
      const data = await res.json();

      const cityAlerts = data.filter(item =>
        item.data && Array.isArray(item.data) &&
        item.data.some(c => c.includes(CITY) || CITY.includes(c))
      );

      if (cityAlerts.length === 0) {
        historyContent.innerHTML = `<div class="no-history">לא נמצאו התרעות עבור אבן יהודה ב-24 השעות האחרונות.</div>`;
        return;
      }

      const items = cityAlerts.map(item => `
        <div class="history-item">
          <div>
            <div class="city">${item.title || 'התרעה'}</div>
            <div class="category">${(item.data || []).join(' • ')}</div>
          </div>
          <div class="time">${formatTime(item.alertDate)}</div>
        </div>
      `).join('');

      historyContent.innerHTML = `<div class="history-list">${items}</div>`;
    } catch (err) {
      historyContent.innerHTML = `<div class="error-notice">⚠️ שגיאה בטעינת היסטוריה: ${err.message}</div>`;
    }
  }

  // Initial load
  fetchCurrentAlerts();
  fetchHistory();
  startProgressBar(ALERT_INTERVAL_MS);

  // Poll current alerts every 5s
  setInterval(() => {
    fetchCurrentAlerts();
    startProgressBar(ALERT_INTERVAL_MS);
  }, ALERT_INTERVAL_MS);

  // Poll history every 60s
  setInterval(fetchHistory, HISTORY_INTERVAL_MS);
</script>
</body>
</html>
